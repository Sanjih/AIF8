<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Fight Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0a0a0f; color: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #00f3ff; text-shadow: 0 0 10px #00f3ff; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
        .back-btn { background: transparent; border: 1px solid #444; color: #888; padding: 8px 16px; border-radius: 15px; font-size: 14px; cursor: pointer; margin-bottom: 20px; align-self: flex-start; }
        .back-btn:hover { border-color: #00f3ff; color: #00f3ff; }
        .challenge-box { background: #12121a; border: 1px solid #333; border-radius: 10px; padding: 15px; width: 100%; max-width: 400px; margin-bottom: 20px; font-size: 14px; color: #ccc; box-sizing: border-box; }
        textarea { width: 100%; max-width: 400px; height: 120px; background: #1e1e2e; border: 1px solid #00f3ff; border-radius: 10px; padding: 15px; color: white; font-size: 16px; resize: none; box-sizing: border-box; }
        button { margin-top: 20px; padding: 15px 40px; font-size: 18px; font-weight: bold; background: linear-gradient(90deg, #00f3ff, #8b5cf6); color: #000; border: none; border-radius: 30px; cursor: pointer; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        #result-box { display: none; margin-top: 30px; background: #12121a; border: 1px solid #8b5cf6; border-radius: 10px; padding: 20px; width: 100%; max-width: 400px; box-sizing: border-box; white-space: pre-wrap; font-size: 14px; }
        .loader { border: 4px solid #333; border-top: 4px solid #00f3ff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-top: 20px; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <button class="back-btn" onclick="Telegram.WebApp.close()">◀️ Retour au menu</button>
    <h1>⚡ PROMPT ARENA</h1>
    <div id="welcome-text" class="subtitle">Chargement...</div>
    <div class="challenge-box">
        <strong>🎯 CHALLENGE:</strong><br>
        Write a prompt that generates a high-converting sales page for an ebook: "Learn ChatGPT in 7 days"
    </div>
    <textarea id="prompt-input" placeholder="Write your ultimate prompt here..."></textarea>
    <button id="fight-btn" onclick="startFight()">⚔️ START FIGHT</button>
    <div id="loader" class="loader"></div>
    <div id="result-box"></div>

    <script>
        const tg = Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe.user;
        const userId = user ? user.id : "inconnu";
        const userName = user ? user.first_name : "Anonyme";
        document.getElementById("welcome-text").innerText = "Welcome back, " + userName + " !";
        const API_URL = "https://TUNNEL_PLACEHOLDER.trycloudflare.com/api/fight"; 

        async function startFight() {
            const prompt = document.getElementById("prompt-input").value;
            if (!prompt) return alert("Enter a prompt!");
            const btn = document.getElementById("fight-btn");
            const loader = document.getElementById("loader");
            const resultBox = document.getElementById("result-box");
            btn.disabled = true;
            loader.style.display = "block";
            resultBox.style.display = "none";
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_prompt: prompt, user_id: userId, user_name: userName })
                });
                const data = await response.json();
                if (data.success) {
                    resultBox.innerHTML = "🔥 RESULT:\n\n" + data.result;
                    resultBox.style.display = "block";
                } else {
                    alert("API Error: " + (data.error || JSON.stringify(data)));
                }
            } catch (e) {
                alert("ERREUR RESEAU: " + e.message);
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
