<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Fight Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0f; color: #ffffff;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        h1 { color: #00f3ff; text-shadow: 0 0 10px #00f3ff; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
        .challenge-box {
            background: #12121a; border: 1px solid #333; border-radius: 10px;
            padding: 15px; width: 100%; max-width: 400px; margin-bottom: 20px;
            font-size: 14px; color: #ccc; box-sizing: border-box;
        }
        textarea {
            width: 100%; max-width: 400px; height: 120px; background: #1e1e2e;
            border: 1px solid #00f3ff; border-radius: 10px; padding: 15px;
            color: white; font-size: 16px; resize: none; box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
        }
        button {
            margin-top: 20px; padding: 15px 40px; font-size: 18px; font-weight: bold;
            background: linear-gradient(90deg, #00f3ff, #8b5cf6); color: #000;
            border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); transition: 0.3s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 243, 255, 0.8); }
        button:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }
        #result-box {
            display: none; margin-top: 30px; background: #12121a; border: 1px solid #8b5cf6;
            border-radius: 10px; padding: 20px; width: 100%; max-width: 400px;
            box-sizing: border-box; white-space: pre-wrap; font-size: 14px;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }
        .loader { border: 4px solid #333; border-top: 4px solid #00f3ff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-top: 20px; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>⚡ PROMPT ARENA</h1>
    <div class="subtitle">ChainGPT Style Web App</div>

    <div class="challenge-box">
        <strong>🎯 CHALLENGE:</strong><br>
        Write a prompt that generates a high-converting sales page for an ebook: "Learn ChatGPT in 7 days"
    </div>

    <textarea id="prompt-input" placeholder="Write your ultimate prompt here..."></textarea>
    
    <button id="fight-btn" onclick="startFight()">⚔️ START FIGHT</button>
    <div id="loader" class="loader"></div>

    <div id="result-box"></div>

    <script>
        const tg = Telegram.WebApp;
        tg.expand();

        // REMPLACE LA LIGNE CI-DESSOUS PAR TON VRAI DOMAINE EX: https://monbot.com/api/fight
        const API_URL ="https://impressive-polo-thomas-collapse.trycloudflare.com"; 

        async function startFight() {
            const prompt = document.getElementById("prompt-input").value;
            if (!prompt) return alert("Enter a prompt!");

            const btn = document.getElementById("fight-btn");
            const loader = document.getElementById("loader");
            const resultBox = document.getElementById("result-box");

            btn.disabled = true;
            loader.style.display = "block";
            resultBox.style.display = "none";

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_prompt: prompt })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultBox.innerHTML = "🔥 RESULT:\n\n" + data.result;
                    resultBox.style.display = "block";
                } else {
                    alert("Error: " + data.error);
                }
            } catch (e) {
                alert("Network error. Is the API running?");
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
